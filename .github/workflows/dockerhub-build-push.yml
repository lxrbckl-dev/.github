name: DockerHub Build & Push (reusable)

on:
  workflow_call:
    inputs:
      context:
        required: false
        type: string
        default: "."
      dockerfile:
        required: false
        type: string
        default: "Dockerfile"
      platforms:
        required: false
        type: string
        default: "linux/arm64"
      caller_event_name:
        required: false
        type: string
        default: ""
      caller_commit_message:
        required: false
        type: string
        default: ""
      image_name:
        required: false
        type: string
        default: ""
        description: |
          Override the image name segment after the DockerHub username.
          Empty (default) → use the GitHub repo name (existing behavior).
          Set for monorepos that publish multiple images per repo, e.g.
          "lucidindex-web" → tags become <user>/lucidindex-web:<tag>.
          Always lowercased.

    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

concurrency:
  # Per-image group key. Monorepo callers invoke this reusable workflow
  # N times in one push (one per image_name); without `image_name` in the
  # group key, all N would land in the same group and `cancel-in-progress`
  # would cancel all but the last to start — only one image would publish.
  # Single-image callers don't pass `image_name`, so their group key is
  # `<workflow>-<ref>-` (trailing dash), which is still stable per
  # (workflow, ref) and preserves the original cancel-the-older-build
  # behavior on rapid successive pushes.
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.image_name }}
  cancel-in-progress: true

jobs:
  build:
    # Trigger on: 1) exact "publish" commit message, or 2) merge commits containing "publish"
    if: >-
      ${{
        inputs.caller_commit_message == 'publish' ||
        (startsWith(inputs.caller_commit_message, 'Merge ') && contains(inputs.caller_commit_message, 'publish'))
      }}

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize names for Docker tags
        shell: bash
        run: |
          # IMAGE_NAME: caller's override if non-empty, otherwise the repo name.
          # Always lowercased — DockerHub repo names are lowercase-only.
          RAW_IMAGE_NAME="${{ inputs.image_name }}"
          if [ -z "$RAW_IMAGE_NAME" ]; then
            RAW_IMAGE_NAME="${{ github.event.repository.name }}"
          fi
          echo "IMAGE_NAME=$(echo "$RAW_IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
          echo "BRANCH_LOWER=$(echo '${{ github.ref_name }}' | tr '[:upper:]' '[:lower:]' | tr '/' '-')" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.BRANCH_LOWER }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}